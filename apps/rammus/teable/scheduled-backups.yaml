apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: teable-db-rustfs
spec:
  schedule: "0 10 3 * * *" # daily 03:10, offset from nocodb (6-field cron, seconds first)
  immediate: true
  backupOwnerReference: self
  cluster:
    name: teable-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: rustfs-store
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: teable-db-offsite
spec:
  schedule: "0 10 4 * * *" # daily 04:10
  backupOwnerReference: self
  cluster:
    name: teable-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: offsite-store
