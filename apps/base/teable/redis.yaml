# Redis cache/queue backend for Teable. ClusterIP-only, no auth needed
# inside the namespace; appendonly on a small PVC so queues survive restarts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teable-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: teable-redis
  template:
    metadata:
      labels:
        app: teable-redis
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:8.8.0-alpine
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
          volumeMounts:
            - mountPath: /data
              name: redis-data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: teable-redis-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: teable-redis-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: teable-redis
spec:
  ports:
    - port: 6379
  selector:
    app: teable-redis
  type: ClusterIP
