apiVersion: apps/v1
kind: Deployment
metadata:
  name: nocodb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nocodb
  template:
    metadata:
      labels:
        app: nocodb
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: nocodb
          image: nocodb/nocodb:2026.06.2
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nocodb-db-app
                  key: uri
            - name: NC_DISABLE_TELE
              value: "true"
          envFrom:
            - secretRef:
                name: nocodb-credentials
          volumeMounts:
            - mountPath: /usr/app/data
              name: nocodb-data
          securityContext:
            allowPrivilegeEscalation: false
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: nocodb-data
          persistentVolumeClaim:
            claimName: nocodb-data-pvc
