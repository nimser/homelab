# One-shot idempotent job creating the buckets expected by consumers.
apiVersion: batch/v1
kind: Job
metadata:
  name: rustfs-create-buckets
  namespace: rustfs
  annotations:
    # Jobs are immutable; let Flux recreate it when the bucket list changes.
    kustomize.toolkit.fluxcd.io/force: "true"
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-buckets
          image: amazon/aws-cli:2.27.49
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              for bucket in cnpg-rammus teable-pub teable-pvt; do
                if aws --endpoint-url http://rustfs:9000 s3api head-bucket --bucket "$bucket" 2>/dev/null; then
                  echo "bucket $bucket already exists"
                else
                  aws --endpoint-url http://rustfs:9000 s3api create-bucket --bucket "$bucket"
                  echo "bucket $bucket created"
                fi
              done
              # Teable serves public-bucket attachments as plain URLs (no presign):
              # the bucket needs anonymous read.
              aws --endpoint-url http://rustfs:9000 s3api put-bucket-policy \
                --bucket teable-pub \
                --policy '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"AWS":["*"]},"Action":["s3:GetObject"],"Resource":["arn:aws:s3:::teable-pub/*"]}]}'
              echo "anonymous read policy set on teable-pub"
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: RUSTFS_ACCESS_KEY
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: RUSTFS_SECRET_KEY
            - name: AWS_DEFAULT_REGION
              value: us-east-1
