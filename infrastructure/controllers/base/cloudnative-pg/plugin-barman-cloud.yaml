# Barman Cloud Plugin: object-store backups for CNPG clusters.
# Must run in the same namespace as the cloudnative-pg operator.
# Requires cert-manager (already deployed) for its internal TLS certificates.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plugin-barman-cloud
spec:
  interval: 30m
  dependsOn:
    - name: cloudnative-pg
  chart:
    spec:
      chart: plugin-barman-cloud
      version: "0.7.0"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: infrastructure
      interval: 12h
