apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "27.*"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: infrastructure
      interval: 12h
  values:
    ports:
      web:
        redirectTo:
          port: websecure
    service:
      type: LoadBalancer
