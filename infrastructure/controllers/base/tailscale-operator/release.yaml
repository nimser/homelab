apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: tailscale-operator
      version: "1.*"
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: infrastructure
      interval: 12h
  valuesFrom:
    - kind: Secret
      name: oauth-credentials
  values:
    oauth:
      client_id: "$(client_id)"
      client_secret: "$(client_secret)"
    proxyConfig:
      tags: "tag:tpad-k8s"
