apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
spec:
  values:
    providers:
      kubernetesIngress:
        publishedService:
          enabled: true
        # Allow Ingress backends pointing at ExternalName services: used by the
        # rustfs ingress (teable attachments) to reach RustFS on karma through
        # the tailscale egress service.
        allowExternalNameServices: true
    service:
      type: LoadBalancer
      annotations:
        tailscale.com/hostname: rammus-traefik
        tailscale.com/tags: tag:rammus
      spec:
        loadBalancerClass: tailscale
