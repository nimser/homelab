machine:
  env:
    TS_AUTHKEY: "" # set via talosctl or SOPS before provisioning
  install:
    extraKernelArgs:
      - "net.ifnames=0"
  files:
    - content: "" # Tailscale auth key, set via SOPS
      permissions: 0o600
      path: /var/run/tailscale/authkey
  extensions:
    - image: ghcr.io/siderolabs/tailscale:1.96.4
