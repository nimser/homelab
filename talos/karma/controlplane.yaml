version: v1alpha1
debug: false
persist: true
machine:
  type: controlplane
  token: "" # filled by talosctl
  ca:
    crt: "" # filled by talosctl
    key: "" # filled by talosctl
  kubelet:
    image: ghcr.io/siderolabs/kubelet:v1.32.4
    defaultRuntimeSeccompProfileEnabled: true
    disableManifestsDirectory: true
  install:
    disk: /dev/sda
    image: ghcr.io/siderolabs/installer:v1.9.5
    wipe: false
  features:
    diskQuotaSupport: true
    kubePrism:
      enabled: true
      port: 7445
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true
      resolveMemberNames: true
  nodeLabels:
    node.kubernetes.io/exclude-from-external-load-balancers: ""
cluster:
  id: "" # filled by talosctl
  secret: "" # filled by talosctl
  controlPlane:
    endpoint: https://127.0.0.1:6443
  clusterName: karma
  network:
    dnsDomain: cluster.local
    podSubnets:
      - 10.42.0.0/16
    serviceSubnets:
      - 10.43.0.0/16
  token: "" # filled by talosctl
  secretboxEncryptionSecret: "" # filled by talosctl
  ca:
    crt: "" # filled by talosctl
    key: "" # filled by talosctl
  aggregatorCA:
    crt: "" # filled by talosctl
    key: "" # filled by talosctl
  serviceAccount:
    key: "" # filled by talosctl
  apiServer:
    image: registry.k8s.io/kube-apiserver:v1.32.4
    admissionControl:
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1alpha1
          defaults:
            audit: restricted
            audit-version: latest
            enforce: baseline
            enforce-version: latest
            warn: restricted
            warn-version: latest
          exemptions:
            namespaces:
              - kube-system
            runtimeClasses: []
            usernames: []
          kind: PodSecurityConfiguration
    auditPolicy:
      apiVersion: audit.k8s.io/v1
      kind: Policy
      rules:
        - level: Metadata
  controllerManager:
    image: registry.k8s.io/kube-controller-manager:v1.32.4
  proxy:
    image: registry.k8s.io/kube-proxy:v1.32.4
  scheduler:
    image: registry.k8s.io/kube-scheduler:v1.32.4
  discovery:
    enabled: false
    registries:
      kubernetes:
        disabled: true
      service: {}
  etcd:
    ca:
      crt: "" # filled by talosctl
      key: "" # filled by talosctl
---
apiVersion: v1alpha1
kind: HostnameConfig
hostname: karma
